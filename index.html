<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたにオススメの副業診断</title>
<style>
  :root{
    --pink:#c81e6d;
    --purple:#6a2c9e;
    --green:#20ac48;
    --green-dark:#188538;
    --bg:#faf8fb;
    --card:#ffffff;
    --text:#2d2a32;
    --sub:#8a8590;
    --line:#ece4f0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.7;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--card);
    box-shadow:0 0 30px rgba(106,44,158,0.1);
    padding-bottom:40px;
  }
  .header-grad{
    background:linear-gradient(135deg,var(--purple),var(--pink));
    padding:28px 24px 20px;
    color:#fff;
    text-align:center;
    border-radius:0 0 28px 28px;
  }
  .header-grad .emoji{font-size:32px;}
  .header-grad h1{font-size:19px;margin:8px 0 4px;}
  .header-grad p{font-size:13px;opacity:0.92;margin:0;}
  .question-image{width:100%;display:block;}
  .screen-image{width:100%;display:block;}
  .q-header-simple{
    background:linear-gradient(135deg,var(--purple),var(--pink));
    padding:30px 24px 26px;
    text-align:center;
    border-radius:0 0 28px 28px;
    color:#fff;
  }
  .q-icon-badge{
    width:60px;height:60px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;
    box-shadow:0 8px 18px rgba(0,0,0,0.18);
  }
  .q-icon-badge svg{width:28px;height:28px;stroke:var(--purple);}
  .q-header-simple .q-header-title{
    font-size:18px;
    font-weight:bold;
  }
  .section{padding:24px;}
  .intro-list{
    background:#f7effa;
    border-radius:16px;
    padding:18px 18px;
    margin:20px 0;
  }
  .intro-item{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
  .intro-item:last-child{margin-bottom:0;}
  .intro-num{
    flex:0 0 26px;height:26px;border-radius:50%;
    background:linear-gradient(135deg,var(--purple),var(--pink));
    color:#fff;font-size:13px;font-weight:bold;
    display:flex;align-items:center;justify-content:center;
  }
  .intro-item p{margin:0;font-size:14px;}
  .intro-item b{color:var(--pink);}
  .meta-line{font-size:13px;color:var(--sub);text-align:center;margin:10px 0;}
  .note-box{
    background:#fffbe8;border:1px solid #f5e6a8;border-radius:12px;
    padding:12px 14px;font-size:12.5px;color:#8a6d1a;margin-top:16px;
  }
  .btn-primary{
    display:block;width:100%;border:none;border-radius:999px;
    padding:16px;font-size:16px;font-weight:bold;color:#fff;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    cursor:pointer;margin-top:22px;
    box-shadow:0 8px 18px rgba(32,172,72,0.35);
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-secondary{
    display:block;width:100%;border:2px solid var(--pink);border-radius:999px;
    padding:14px;font-size:15px;font-weight:bold;color:var(--pink);
    background:#fff;cursor:pointer;margin-top:12px;
  }
  .btn-disabled-look{
    display:block;width:100%;border:none;border-radius:999px;
    padding:16px;font-size:16px;font-weight:bold;color:#fff;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    margin-top:22px;text-align:center;opacity:0.55;
  }

  /* progress */
  .progress-wrap{padding:18px 24px 0;}
  .check-label{font-size:12px;color:var(--pink);font-weight:bold;margin-bottom:8px;}
  .dots{display:flex;gap:6px;margin-bottom:18px;}
  .dot{flex:1;height:6px;border-radius:4px;background:var(--line);}
  .dot.active{background:linear-gradient(90deg,var(--purple),var(--pink));}
  .dot.done{background:#f3c9d7;}

  /* question */
  .q-wrap{padding:20px 24px 24px;}
  .q-num{font-size:12px;color:var(--sub);font-weight:bold;letter-spacing:1px;}
  .q-text{font-size:17px;font-weight:bold;margin:8px 0 4px;}
  .q-sub{font-size:12.5px;color:var(--sub);margin-bottom:18px;}
  .option{
    display:block;width:100%;text-align:left;
    border:2px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:10px;background:#fff;
    font-size:14.5px;color:var(--text);cursor:pointer;
    transition:all .15s ease;
  }
  .option:hover{border-color:#f0b8cc;}
  .option.selected{
    border-color:var(--pink);
    background:linear-gradient(135deg,#fff0f6,#f5eefb);
    font-weight:bold;
  }
  .nav-row{display:flex;gap:10px;margin-top:18px;}
  .nav-row .btn-back{
    flex:0 0 auto;border:none;background:none;color:var(--sub);
    font-size:13px;padding:10px;cursor:pointer;
  }
  .nav-row .btn-next{flex:1;}

  .rank-row{margin-bottom:14px;}
  .rank-row label{
    display:block;font-size:12.5px;font-weight:bold;color:var(--pink);margin-bottom:6px;
  }
  .rank-row select{
    width:100%;padding:13px 14px;border-radius:12px;border:2px solid var(--line);
    font-size:14px;color:var(--text);background:#fff;
    -webkit-appearance:none;appearance:none;
  }
  textarea.text-input{
    width:100%;min-height:120px;border-radius:14px;border:2px solid var(--line);
    padding:14px;font-size:14.5px;font-family:inherit;resize:vertical;
  }

  /* result */
  .result-hero{
    background:linear-gradient(135deg,var(--purple),var(--pink));
    color:#fff;padding:30px 24px 26px;text-align:center;
    border-radius:0 0 28px 28px;
  }
  .result-hero .small{font-size:12.5px;opacity:0.9;}
  .result-hero h2{font-size:20px;margin:8px 0 4px;}
  .result-hero .reveal{font-size:24px;font-weight:bold;margin:6px 0 12px;}
  .fit-circle{
    width:120px;height:120px;border-radius:50%;
    background:rgba(255,255,255,0.15);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    margin:10px auto 6px;border:4px solid rgba(255,255,255,0.5);
  }
  .fit-circle .pct{font-size:30px;font-weight:bold;}
  .fit-circle .lbl{font-size:11px;}
  .form-field{margin-bottom:18px;}
  .form-field label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px;}
  .form-field input[type="text"],.form-field input[type="email"]{
    width:100%;padding:13px 14px;border-radius:12px;border:2px solid var(--line);
    font-size:14.5px;color:var(--text);font-family:inherit;
  }
  .form-note{font-size:12px;color:var(--sub);margin-bottom:12px;}
  .checkbox-option{
    display:flex;align-items:flex-start;gap:10px;
    border:2px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:10px;background:#fff;cursor:pointer;
    font-size:13.5px;color:var(--text);
  }
  .checkbox-option.checked{
    border-color:var(--pink);background:linear-gradient(135deg,#fff0f6,#f5eefb);
  }
  .checkbox-option input{margin-top:3px;flex:0 0 auto;}
  .caution-note{
    background:#fff8ec;border-radius:10px;padding:12px 14px;font-size:12px;color:#8a6d1a;margin-top:4px;
  }
  .card{
    background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:18px;margin:16px 24px;
  }
  .card h3{font-size:15px;margin:0 0 12px;color:var(--pink);}
  .review-table{width:100%;border-collapse:collapse;font-size:13px;}
  .review-table td{padding:7px 4px;border-bottom:1px solid var(--line);vertical-align:top;}
  .review-table td:first-child{color:var(--sub);width:34%;}
  .job-card{border:1.5px solid var(--pink);border-radius:14px;padding:16px;background:#fff6f9;}
  .job-card h4{margin:2px 0 8px;font-size:16px;}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
  .tag-row span{
    font-size:11px;background:#f3ecff;color:var(--purple);
    padding:3px 9px;border-radius:999px;
  }
  .job-card ol,.job-card ul{margin:8px 0;padding-left:18px;font-size:13px;}
  .job-card li{margin-bottom:6px;}
  .cta-box{margin:22px 24px 8px;text-align:center;}
  .cta-box p{font-size:13.5px;color:var(--sub);margin-bottom:12px;}
  .cta-sub{font-size:12px;color:var(--sub);margin-top:8px;}
  .footnote{font-size:11px;color:var(--sub);text-align:center;padding:0 24px;margin-top:10px;}
  .quote-line{
    border-left:4px solid var(--pink);padding-left:12px;font-size:13.5px;color:var(--text);
    background:#fff8fb;border-radius:0 8px 8px 0;padding:10px 12px;margin-top:6px;
  }
  .hidden{display:none !important;}
</style>
</head>

    text:"「稼ぐことも、家族との時間も、どちらも諦めたくない」——その感覚は、僕自身が一番強く持っていたものです。医療職として16年間勤めた病院で、月末はカードの支払い後の残高にため息をつきながらも、家族との時間を削ってまで働くことに違和感を持ち続けていました。今は0秒出社で、子供の学校行事にもお迎えにも気兼ねなく行ける生活を送っています。無理に作業時間を増やす必要はありません。1日30分〜1時間のスキマ時間からでも、コツコツ積み上げれば結果はついてきます。",
  },
  mypace:{
    label:"自分のペースを大事にしたいタイプ",
    text:"「人と比べず、自分のペースで進めたい」——それは弱さではなく、長く続けるための一番の武器です。SNS発信は、一気に頑張って燃え尽きるより、無理のないペースで続けられた人の方が最終的に大きな結果を残しています。僕も収益が伸び悩んだ月がありながら、「やめたら人生が逆戻りになる」と自分に言い聞かせ、自分のペースを崩さずに走り続けたことで、6ヶ月目に3,262,211円という結果につながりました。焦らず、まずは週2〜3投稿から始めてみてください。積み上げた投稿は、あなたが休んでいる間も資産として働き続けてくれます。",
  },
};

const MONEY_MAP = {
  enough:{
    title:"「自由に使えるお金は割とある」あなたへ",
    text:"月に2〜3万円以上、自分のために自由に使えるお金があるのは、実は大きなアドバンテージです。その一部をAIツールや学びに投資できれば、投稿づくりにかかる時間を大きく短縮できます。僕も独学で試行錯誤する中で「最初から仕組みを知っていれば」と感じた場面が何度もありました。今の余裕を、遠回りをしないための先行投資に変えていきましょう。",
  },
  a_little:{
    title:"「工夫すれば少し作れる」あなたへ",
    text:"「今はあまり余裕がないけれど、工夫すれば少しは作れる」——それで十分です。インスタ発信は、事務所も名刺も在庫も必要なく、スマホ1台・0円から始められます。僕も副業を始めた1ヶ月目の収益は124,800円でしたが、そこにかけた初期費用はほとんどありませんでした。無理に何かを買い足す必要はなく、今ある環境のまま、まずは投稿を1つ作ってみることから始められます。",
  },
  none:{
    title:"「今は生活がギリギリ」なあなたへ",
    text:"「生活がギリギリで、自由に使えるお金が1円もない」——その状態だからこそ、在庫を抱えたり広告費を払ったりする必要があるビジネスではなく、インスタ×アフィリエイトのように元手がほとんどかからない仕組みが向いています。僕も会社員時代、月末はカードの支払い後の残高にため息をつく生活を送っていました。お金をかけずに始められて、続けた分だけ資産になっていくのがこの働き方の一番の良さです。まずはお金を使わずに、今日1つ投稿してみることから始めてみてください。",
  },
};

/* =========================================================
   状態管理
========================================================= */
let state = { screen:"intro", qIndex:0, answers:{ q5:{1:"",2:"",3:""}, q6:"" } };

function saveResult(result){
  try{ localStorage.setItem(CONFIG.storageKey, JSON.stringify(result)); }catch(e){}
}
function loadResult(){
  try{ return JSON.parse(localStorage.getItem(CONFIG.storageKey)); }catch(e){ return null; }
}
function goalLabel(value){
  const g = GOAL_ITEMS.find(g=>g.value===value);
  return g ? g.label : "-";
}
function goalNote(value){
  const g = GOAL_ITEMS.find(g=>g.value===value);
  return g ? g.note : "";
}

/* =========================================================
   スコア計算（演出用のマッチ度）
========================================================= */
function computeResult(answers){
  const valueBonus = { gogo:5, balance:3, mypace:0 }[answers.q4] || 0;
  const moneyBonus = { enough:5, a_little:3, none:8 }[answers.q7] || 0;
  let fit = 80 + valueBonus + moneyBonus;
  fit = Math.max(80, Math.min(96, fit));
  return { fit, answers };
}

/* =========================================================
   レンダリング
========================================================= */
const app = document.getElementById("app");

function render(){
  if(state.screen === "intro") return renderIntro();
  if(state.screen === "question") return renderQuestion();
  if(state.screen === "finish") return renderFinish();
  if(state.screen === "result") return renderResult();
  if(state.screen === "apply") return renderApply();
  if(state.screen === "confirm") return renderConfirm();
  if(state.screen === "done") return renderDone();
}

function renderIntro(){
  const saved = loadResult();
  app.innerHTML = `
    <img src="cover.png" alt="あなたにオススメの副業診断" style="width:100%;display:block;border-radius:0 0 28px 28px;">
    <div class="section">
      <div class="intro-list">
        <div class="intro-item"><div class="intro-num">1</div><p>価値観・目標・状況から、<b>あなたに合う稼ぎ方</b>がわかる</p></div>
        <div class="intro-item"><div class="intro-num">2</div><p>あなたが<b>本当に叶えたいこと</b>が明確になる</p></div>
        <div class="intro-item"><div class="intro-num">3</div><p>回答を分析して、<b>今のあなたに一番フィットする副業</b>が見つかる</p></div>
      </div>
      <p class="meta-line">✨ 選択式・記述式 全7問・所要時間1分ほど</p>
      <div class="note-box">結果はこの端末に保存されるので、あとから何度でも見返せます。じっくり選んでくださいね。</div>
      <button class="btn-primary" id="startBtn">診断をはじめる</button>
      ${saved ? '<button class="btn-secondary" id="viewSavedBtn">前回の結果を見る</button>' : ""}
    </div>
  `;
  document.getElementById("startBtn").onclick = ()=>{
    state = { screen:"question", qIndex:0, answers:{ q5:{1:"",2:"",3:""}, q6:"" } };
    render();
  };
  const viewBtn = document.getElementById("viewSavedBtn");
  if(viewBtn) viewBtn.onclick = ()=>{
    state.screen = "result";
    state.result = saved;
    render();
  };
}

function renderQuestion(){
  const q = QUESTIONS[state.qIndex];

  const dotsHtml = QUESTIONS.map((_,i)=>{
    let cls = "dot";
    if(i < state.qIndex) cls += " done";
    if(i === state.qIndex) cls += " active";
    return `<div class="${cls}"></div>`;
  }).join("");

  let bodyHtml = "";
  let showNextBtn = false;

  if(q.type === "single"){
    const currentAnswer = state.answers[q.id];
    bodyHtml = q.options.map((opt,i)=>{
      const selected = currentAnswer === opt.value;
      return `<button class="option${selected?" selected":""}" data-value="${i}">${opt.label}</button>`;
    }).join("");
  }

  if(q.type === "ranking"){
    showNextBtn = true;
    bodyHtml = `
      <div class="rank-row">
        <label>1位</label>
        <select id="rankSelect1" data-rank="1"></select>
      </div>
      <div class="rank-row">
        <label>2位</label>
        <select id="rankSelect2" data-rank="2"></select>
      </div>
      <div class="rank-row">
        <label>3位</label>
        <select id="rankSelect3" data-rank="3"></select>
      </div>
    `;
  }

  if(q.type === "text"){
    showNextBtn = true;
    bodyHtml = `<textarea class="text-input" id="textInput" placeholder="例：会社の給料以外に、毎月10万円の収入源を作りたい">${state.answers.q6 || ""}</textarea>`;
  }

  app.innerHTML = `
    ${ICON_PATHS[q.id] ? `<div class="q-header-simple"><div class="q-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[q.id]}</svg></div><div class="q-header-title">${q.text}</div></div>` : ""}
    <div class="progress-wrap">
      <div class="check-label">STEP ${state.qIndex+1} / ${QUESTIONS.length}</div>
      <div class="dots">${dotsHtml}</div>
    </div>
    <div class="q-wrap">
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ""}
      <div id="optionsWrap">${bodyHtml}</div>
      <div class="nav-row">
        ${state.qIndex>0 ? '<button class="btn-back" id="backBtn">← もどる</button>' : "<span></span>"}
        ${showNextBtn ? `<button class="btn-primary btn-next" id="nextBtn" ${(q.type==="ranking" || (q.type==="text" && !(state.answers.q6||"").trim()))?"disabled":""}>次へ</button>` : ""}
      </div>
    </div>
  `;

  if(q.type === "single"){
    document.querySelectorAll(".option").forEach(btn=>{
      btn.onclick = ()=>{
        const idx = Number(btn.dataset.value);
        state.answers[q.id] = q.options[idx].value;
        goNext();
      };
    });
  }

  if(q.type === "ranking"){
    setupRankSelects();
  }

  if(q.type === "text"){
    const textarea = document.getElementById("textInput");
    textarea.oninput = ()=>{
      state.answers.q6 = textarea.value;
      const nextBtn = document.getElementById("nextBtn");
      if(nextBtn) nextBtn.disabled = !textarea.value.trim();
    };
  }

  const backBtn = document.getElementById("backBtn");
  if(backBtn) backBtn.onclick = ()=>{
    state.qIndex = Math.max(0, state.qIndex-1);
    render();
  };
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.onclick = goNext;
}

function setupRankSelects(){
  const ranks = [1,2,3];
  function rebuild(){
    const chosen = state.answers.q5;
    ranks.forEach(r=>{
      const sel = document.getElementById("rankSelect"+r);
      const otherChosen = ranks.filter(x=>x!==r).map(x=>chosen[x]).filter(Boolean);
      const currentVal = chosen[r] || "";
      let html = `<option value="">選択してください</option>`;
      GOAL_ITEMS.forEach(item=>{
        if(otherChosen.includes(item.value) && item.value !== currentVal) return;
        html += `<option value="${item.value}" ${item.value===currentVal?"selected":""}>${item.label}</option>`;
      });
      sel.innerHTML = html;
    });
    const nextBtn = document.getElementById("nextBtn");
    if(nextBtn) nextBtn.disabled = !(chosen[1] && chosen[2] && chosen[3]);
  }
  ranks.forEach(r=>{
    const sel = document.getElementById("rankSelect"+r);
    sel.onchange = ()=>{
      state.answers.q5[r] = sel.value;
      rebuild();
    };
  });
  rebuild();
}

function goNext(){
  if(state.qIndex < QUESTIONS.length-1){
    state.qIndex++;
    render();
  } else {
    const result = computeResult(state.answers);
    saveResult(result);
    state.result = result;
    state.screen = "finish";
    render();
  }
}

function renderFinish(){
  app.innerHTML = `
    <img src="finish.png" alt="回答ありがとうございました" class="screen-image" style="border-radius:0 0 28px 28px;">
    <div class="section">
      <div class="intro-list">
        <div class="intro-item"><div class="intro-num">1</div><p>あなたの<b>価値観・目標・状況</b>を分析しました</p></div>
        <div class="intro-item"><div class="intro-num">2</div><p>今のあなたに<b>一番フィットする副業</b>が見つかりました</p></div>
        <div class="intro-item"><div class="intro-num">3</div><p>続けられる<b>具体的なはじめ方</b>も一緒にご案内します</p></div>
      </div>
      <button class="btn-primary" id="showResultBtn">診断結果を見る</button>
    </div>
  `;
  document.getElementById("showResultBtn").onclick = ()=>{
    state.screen = "result";
    render();
  };
}

function renderResult(){
  const r = state.result;
  const a = r.answers;
  const valueInfo = VALUE_MAP[a.q4];
  const moneyInfo = MONEY_MAP[a.q7];
  const rank1 = a.q5[1], rank2 = a.q5[2], rank3 = a.q5[3];

  const reviewRows = [
    ["性別", a.q1], ["年齢", a.q2], ["職業", a.q3],
    ["価値観", valueInfo ? valueInfo.label : "-"],
    ["1位", goalLabel(rank1)], ["2位", goalLabel(rank2)], ["3位", goalLabel(rank3)],
    ["自由に使えるお金", ({enough:"2〜3万円以上はある",a_little:"工夫すれば少し作れる",none:"今はギリギリ"})[a.q7]],
    ["こうなりたい", a.q6 ? a.q6 : "（未記入）"],
  ];

  app.innerHTML = `
    <img src="result-hero.png" alt="あなたにオススメの副業はInstagram×Threads×アフィリエイトです" class="screen-image" style="border-radius:0 0 28px 28px;">
    <div class="result-hero" style="padding-top:20px;padding-bottom:20px;">
      <div class="fit-circle">
        <div class="pct">${r.fit}%</div>
        <div class="lbl">マッチ度</div>
      </div>
      <div class="small">回答の内容から算出したチェックスコアです</div>
    </div>

    <div class="card">
      <h3>📝 まずは回答のふりかえり</h3>
      <table class="review-table">
        ${reviewRows.map(([k,v])=>`<tr><td>${k}</td><td>${v||"-"}</td></tr>`).join("")}
      </table>
    </div>

    <div class="card">
      <h3>${valueInfo.label}のあなたへ</h3>
      <p style="font-size:13.5px;margin:0;">${valueInfo.text}</p>
    </div>

    <div class="card">
      <h3>一番の目標「${goalLabel(rank1)}」について</h3>
      <div class="quote-line">${goalNote(rank1)}</div>
    </div>

    <div class="card">
      <h3>${moneyInfo.title}</h3>
      <p style="font-size:13.5px;margin:0;">${moneyInfo.text}</p>
    </div>

    <div class="card">
      <h3>🎯 なぜInstagram×Threads×アフィリエイトなのか</h3>
      <div class="job-card">
        <h4>在庫なし・顔出し不要・AIで時短</h4>
        <div class="tag-row"><span>初期費用ほぼ0円</span><span>スキマ時間OK</span><span>積み上げが資産になる</span></div>
        <ul>
          <li>在庫や発送がいらないので、身体的な負担がない</li>
          <li>顔出しをしなくても発信・収益化ができる</li>
          <li>ChatGPTやClaudeにネタ出し・台本作成を手伝ってもらえる</li>
          <li>投稿は消えずに資産として積み上がり続ける</li>
        </ul>
        <h4 style="margin-top:14px;">はじめ方はシンプルな3ステップ</h4>
        <ol>
          <li>ジャンルを決める（生活雑貨・美容・食品などから）</li>
          <li>AIにネタ出し・投稿文の作成を手伝ってもらう</li>
          <li>Instagram・Threadsに投稿し、アフィリエイトリンクで収益化する</li>
        </ol>
      </div>
    </div>

    <div class="cta-box">
      <p>さらに詳しく知りたい方は、こちら</p>
      <button class="btn-primary" id="applyBtn">${CONFIG.ctaLabel}</button>
    </div>
    <p class="footnote">この結果はあなたのブラウザに保存されました。同じ端末からは何度開いても同じ結果が出ます。</p>
  `;

  document.getElementById("applyBtn").onclick = ()=>{
    state.application = state.application || { name:"", email:"", considerations:[] };
    state.screen = "apply";
    render();
  };
}

function renderApply(){
  const app_ = state.application || { name:"", email:"", considerations:[] };
  state.application = app_;

  const checkboxesHtml = CONSIDERATION_OPTIONS.map((label,i)=>{
    const checked = app_.considerations.includes(label);
    return `
      <label class="checkbox-option${checked?" checked":""}">
        <input type="checkbox" data-idx="${i}" ${checked?"checked":""}>
        <span>${label}</span>
      </label>
    `;
  }).join("");

  app.innerHTML = `
    <img src="apply.png" alt="個別相談のお申し込み" class="screen-image" style="border-radius:0 0 28px 28px;">
    <p style="text-align:center;font-size:13px;color:var(--sub);padding:16px 24px 0;">あと少しで完了です。下記の項目を入力してください。</p>
    <div class="section">
      <div class="form-field">
        <label>お名前</label>
        <input type="text" id="nameInput" placeholder="例：山田 花子" value="${app_.name || ""}">
      </div>
      <div class="form-field">
        <label>メールアドレス</label>
        <input type="email" id="emailInput" placeholder="例：example@mail.com" value="${app_.email || ""}">
      </div>
      <div class="form-field">
        <label>特別な配慮が必要とされる状況はありますか？（複数選択可）</label>
        <div id="considerationsWrap">${checkboxesHtml}</div>
        <div class="caution-note">※現在の状況によっては安全面を最優先に考え、ご参加を見合わせていただく場合があります。</div>
      </div>
      <div class="nav-row">
        <button class="btn-back" id="backBtn">← もどる</button>
        <button class="btn-primary btn-next" id="nextBtn" disabled>確認する</button>
      </div>
    </div>
  `;

  function validate(){
    const valid = app_.name.trim() && app_.email.trim() && app_.considerations.length > 0;
    document.getElementById("nextBtn").disabled = !valid;
  }

  document.getElementById("nameInput").oninput = (e)=>{ app_.name = e.target.value; validate(); };
  document.getElementById("emailInput").oninput = (e)=>{ app_.email = e.target.value; validate(); };

  document.querySelectorAll("#considerationsWrap input[type=checkbox]").forEach(cb=>{
    cb.onchange = ()=>{
      const idx = Number(cb.dataset.idx);
      const label = CONSIDERATION_OPTIONS[idx];
      if(idx === 0){
        // 「下記の状況に当てはまらない」を選んだら他はすべて解除
        app_.considerations = cb.checked ? [label] : [];
      } else {
        app_.considerations = app_.considerations.filter(v=>v!==CONSIDERATION_OPTIONS[0]);
        if(cb.checked) app_.considerations.push(label);
        else app_.considerations = app_.considerations.filter(v=>v!==label);
      }
      renderApply();
    };
  });

  document.getElementById("backBtn").onclick = ()=>{
    state.screen = "result";
    render();
  };
  document.getElementById("nextBtn").onclick = ()=>{
    state.screen = "confirm";
    render();
  };

  validate();
}

function renderConfirm(){
  const r = state.result;
  const a = r.answers;
  const app_ = state.application;
  const valueInfo = VALUE_MAP[a.q4];
  const rank1 = a.q5[1], rank2 = a.q5[2], rank3 = a.q5[3];

  const reviewRows = [
    ["性別", a.q1], ["年齢", a.q2], ["職業", a.q3],
    ["価値観", valueInfo ? valueInfo.label : "-"],
    ["1位", goalLabel(rank1)], ["2位", goalLabel(rank2)], ["3位", goalLabel(rank3)],
    ["自由に使えるお金", ({enough:"2〜3万円以上はある",a_little:"工夫すれば少し作れる",none:"今はギリギリ"})[a.q7]],
    ["こうなりたい", a.q6 || "-"],
    ["お名前", app_.name],
    ["メールアドレス", app_.email],
    ["特別な配慮", app_.considerations.join("・")],
  ];

  app.innerHTML = `
    <div class="header-grad">
      <div class="emoji">✅</div>
      <h1>入力内容のご確認</h1>
      <p>この内容で個別相談にお申し込みします。<br>間違いがないかご確認ください。</p>
    </div>
    <div class="card">
      <h3>📝 回答内容の確認</h3>
      <table class="review-table">
        ${reviewRows.map(([k,v])=>`<tr><td>${k}</td><td>${v||"-"}</td></tr>`).join("")}
      </table>
    </div>
    <div class="cta-box">
      <button class="btn-primary" id="submitBtn">個別相談に申し込む</button>
      <button class="btn-secondary" id="editBtn">内容を修正する</button>
    </div>
  `;

  document.getElementById("editBtn").onclick = ()=>{
    state.screen = "apply";
    render();
  };
  document.getElementById("submitBtn").onclick = ()=>{
    saveResult({ ...r, application: app_ });
    if(CONFIG.afterSubmitUrl){
      location.href = CONFIG.afterSubmitUrl;
    } else {
      state.screen = "done";
      render();
    }
  };
}

function renderDone(){
  const considerations = (state.application && state.application.considerations) || [];
  const noConcerns = considerations.includes(CONSIDERATION_OPTIONS[0]);

  if(noConcerns){
    app.innerHTML = `
      <img src="done.png" alt="個別相談の申し込みありがとうございます" class="screen-image" style="border-radius:0 0 28px 28px;">
    `;
  } else {
    app.innerHTML = `
      <div class="header-grad">
        <div class="emoji">🙏</div>
        <h1>個別相談のお申し込みありがとうございます</h1>
        <p>内容を確認して、担当者よりご連絡します。</p>
      </div>
    `;
  }
}

render();
</script>
</body>
</html>
